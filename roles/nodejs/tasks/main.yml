---
# Role: nodejs — Node.js 22 LTS via NodeSource

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/setup_{{ node_major_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  ansible.builtin.command: /tmp/nodesource_setup.sh
  changed_when: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Verify Node.js version
  ansible.builtin.command: node -v
  register: node_version_output
  changed_when: false

- name: Show Node.js version
  ansible.builtin.debug:
    msg: "Node.js version: {{ node_version_output.stdout }}"
