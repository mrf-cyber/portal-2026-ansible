---
# Role: app — Deploy code, dependencies, migrations, .env

- name: Ensure application directory exists
  ansible.builtin.file:
    path: "{{ app_path }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Ensure www-data has a home with .ssh directory
  ansible.builtin.file:
    path: /var/www/.ssh
    state: directory
    owner: www-data
    group: www-data
    mode: "0700"

- name: Copy deploy key for portal-2026-react to www-data
  ansible.builtin.copy:
    src: "{{ deploy_key_path }}"
    dest: /var/www/.ssh/repo-deploy-key-react
    owner: www-data
    group: www-data
    mode: "0600"

- name: Add github.com to known_hosts for www-data
  ansible.builtin.known_hosts:
    path: /var/www/.ssh/known_hosts
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t rsa,ecdsa,ed25519 github.com') }}"
  become_user: www-data

- name: Deploy application code from git repository
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_path }}"
    version: "{{ app_branch }}"
    accept_hostkey: true
    force: true
    key_file: /var/www/.ssh/repo-deploy-key-react
  become_user: www-data

- name: Deploy .env from template
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_path }}/.env"
    owner: www-data
    group: www-data
    mode: "0640"

- name: Install Composer
  ansible.builtin.shell: |
    curl -sS https://getcomposer.org/installer | php
    mv composer.phar /usr/local/bin/composer
  args:
    creates: /usr/local/bin/composer

- name: Install PHP dependencies
  ansible.builtin.command: composer install --no-dev --optimize-autoloader --no-interaction
  args:
    chdir: "{{ app_path }}"
  changed_when: true

- name: Install Node.js dependencies
  ansible.builtin.command: npm ci
  args:
    chdir: "{{ app_path }}"
  changed_when: true

- name: Build frontend assets
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ app_path }}"
  changed_when: true

- name: Generate application key (if not set)
  ansible.builtin.command: php artisan key:generate --force
  args:
    chdir: "{{ app_path }}"
  when: app_key is not defined or app_key == ""
  changed_when: true

- name: Run database migrations
  ansible.builtin.command: php artisan migrate --force
  args:
    chdir: "{{ app_path }}"
  changed_when: true

- name: Create storage symlink
  ansible.builtin.command: php artisan storage:link
  args:
    chdir: "{{ app_path }}"
    creates: "{{ app_path }}/public/storage"

- name: Create invoices storage directory
  ansible.builtin.file:
    path: "{{ app_path }}/storage/app/invoices"
    state: directory
    owner: www-data
    group: www-data
    mode: "0775"

- name: Cache configuration
  ansible.builtin.command: "php artisan {{ item }}"
  args:
    chdir: "{{ app_path }}"
  loop:
    - config:cache
    - route:cache
    - view:cache
    - event:cache
  changed_when: true

- name: Set ownership to www-data
  ansible.builtin.file:
    path: "{{ app_path }}"
    owner: www-data
    group: www-data
    recurse: true

- name: Set writable permissions on storage and cache
  ansible.builtin.file:
    path: "{{ app_path }}/{{ item }}"
    mode: "0775"
    recurse: true
  loop:
    - storage
    - bootstrap/cache
